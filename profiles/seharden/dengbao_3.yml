      - name: high_risk_ports
        func: network.find_listening_ports
        params:
          ports: [21, 23, 25, 111, 427, 631]
    assertion:
      all_of:
        - actual: "%{probe.high_risk_ports}"
          key: "available"
          compare: is_true
          message: "Unable to inspect listening ports with the 'ss' command."
        - actual: "%{probe.high_risk_ports}"
          key: "count"
          compare: equals
          expected: 0
          message: "Found listening high-risk management or sharing ports."
