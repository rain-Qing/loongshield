        params: { name: "rsyslog" }
      - action: services.set_filestate
        params: { name: "rsyslog", state: "enable" }
      - action: services.set_active_state
        params: { name: "rsyslog", state: "start" }

  - id: "3.1.3"
    desc: "Ensure audit log size and retention are configured"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: auditd_conf_settings
        func: file.parse_key_values
        params:
          path: "/etc/audit/auditd.conf"
          allow_missing: true
          normalize_values: "lower"
    assertion:
      all_of:
        - actual: "%{probe.auditd_conf_settings}"
          key: "max_log_file"
          compare: is_greater_than
          expected: 0
          message: "The 'max_log_file' parameter is missing or not greater than 0 in /etc/audit/auditd.conf."
        - any_of:
            - actual: "%{probe.auditd_conf_settings}"
              key: "max_log_file_action"
              compare: equals
              expected: "keep_logs"
              message: "Audit log retention is not configured with 'keep_logs' or rotating logs in /etc/audit/auditd.conf."
            - all_of:
                - actual: "%{probe.auditd_conf_settings}"
                  key: "max_log_file_action"
                  compare: equals
                  expected: "rotate"
                  message: "Audit log retention is not configured with 'keep_logs' or rotating logs in /etc/audit/auditd.conf."
                - actual: "%{probe.auditd_conf_settings}"
                  key: "num_logs"
                  compare: is_greater_than_or_equal_to
                  expected: 2
                  message: "The 'num_logs' parameter must be at least 2 when 'max_log_file_action=rotate' in /etc/audit/auditd.conf."
    reinforce:
      - action: file.set_key_value
        params:
          path: "/etc/audit/auditd.conf"
          key: "max_log_file"
          value: "8"
          separator: "="
      - action: file.set_key_value
        params:
          path: "/etc/audit/auditd.conf"
          key: "max_log_file_action"
          value: "keep_logs"
          separator: "="

  - id: "3.1.4"
    desc: "Ensure audit logs are not automatically deleted"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: auditd_conf_settings
        func: file.parse_key_values
        params:
          path: "/etc/audit/auditd.conf"
          allow_missing: true
          normalize_values: "lower"
    assertion:
      all_of:
        - actual: "%{probe.auditd_conf_settings}"
          key: "max_log_file_action"
          compare: equals
          expected: "keep_logs"
          message: "max_log_file_action is not set to 'keep_logs' in /etc/audit/auditd.conf."
    reinforce:
      - action: file.set_key_value
        params:
          path: "/etc/audit/auditd.conf"
          key: "max_log_file_action"
          value: "keep_logs"
          separator: "="

  - id: "3.1.5"
    desc: "Ensure the system reacts safely when audit logs are full"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: auditd_conf_settings
        func: file.parse_key_values
        params:
          path: "/etc/audit/auditd.conf"
          allow_missing: true
          normalize_values: "lower"
    assertion:
      all_of:
        - any_of:
            - all_of:
                - actual: "%{probe.auditd_conf_settings}"
                  key: "space_left_action"
                  compare: equals
                  expected: "email"
                  message: "space_left_action is not set to 'email' or 'syslog' in /etc/audit/auditd.conf."
                - actual: "%{probe.auditd_conf_settings}"
                  key: "action_mail_acct"
                  compare: equals
                  expected: "root"
                  message: "action_mail_acct must be set to 'root' when space_left_action=email."
            - actual: "%{probe.auditd_conf_settings}"
              key: "space_left_action"
              compare: equals
              expected: "syslog"
              message: "space_left_action is not set to 'email' or 'syslog' in /etc/audit/auditd.conf."
        - any_of:
            - actual: "%{probe.auditd_conf_settings}"
              key: "admin_space_left_action"
              compare: equals
              expected: "single"
              message: "admin_space_left_action is not set to 'single' or 'halt' in /etc/audit/auditd.conf."
            - actual: "%{probe.auditd_conf_settings}"
              key: "admin_space_left_action"
              compare: equals
              expected: "halt"
              message: "admin_space_left_action is not set to 'single' or 'halt' in /etc/audit/auditd.conf."
        - any_of:
            - actual: "%{probe.auditd_conf_settings}"
              key: "disk_full_action"
              compare: equals
              expected: "single"
              message: "disk_full_action is not set to 'single' or 'halt' in /etc/audit/auditd.conf."
            - actual: "%{probe.auditd_conf_settings}"
              key: "disk_full_action"
              compare: equals
              expected: "halt"
              message: "disk_full_action is not set to 'single' or 'halt' in /etc/audit/auditd.conf."
        - any_of:
            - actual: "%{probe.auditd_conf_settings}"
              key: "disk_error_action"
              compare: equals
              expected: "syslog"
              message: "disk_error_action is not set to 'syslog', 'single', or 'halt' in /etc/audit/auditd.conf."
            - actual: "%{probe.auditd_conf_settings}"
              key: "disk_error_action"
              compare: equals
              expected: "single"
              message: "disk_error_action is not set to 'syslog', 'single', or 'halt' in /etc/audit/auditd.conf."
            - actual: "%{probe.auditd_conf_settings}"
              key: "disk_error_action"
              compare: equals
              expected: "halt"
              message: "disk_error_action is not set to 'syslog', 'single', or 'halt' in /etc/audit/auditd.conf."
    reinforce:
      - action: file.set_key_value
        params:
          path: "/etc/audit/auditd.conf"
          key: "space_left_action"
          value: "syslog"
          separator: "="
      - action: file.set_key_value
        params:
          path: "/etc/audit/auditd.conf"
          key: "admin_space_left_action"
          value: "single"
          separator: "="
      - action: file.set_key_value
        params:
          path: "/etc/audit/auditd.conf"
          key: "disk_full_action"
          value: "single"
          separator: "="
      - action: file.set_key_value
        params:
          path: "/etc/audit/auditd.conf"
          key: "disk_error_action"
          value: "syslog"
          separator: "="

  - id: "3.2.2"
    desc: "Ensure auditing for processes that start prior to auditd is enabled"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: audit_boot_param
        func: file.find_pattern
        params:
          paths:
            - "/boot/grub2/grub.cfg"
            - "/boot/grub2/grubenv"
            - "/boot/efi/EFI/*/grub.cfg"
          pattern: "^[[:space:]]*(kernelopts|linux|kernel).*audit=1([^0-9]|$)"
    assertion:
      all_of:
        - actual: "%{probe.audit_boot_param}"
          key: "found"
          compare: is_true
          message: "The 'audit=1' kernel parameter is not configured in the bootloader."

  - id: "3.3.1"
    desc: "Ensure file deletion events are collected by audit"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: login_defs
        func: file.parse_key_values
        params:
          path: "/etc/login.defs"
      - name: audit_arches
        func: system.get_supported_audit_arches
        params: {}
      - name: file_delete_audit_rule
        func: audit.find_syscall_rule
        params:
          syscalls: ["unlink", "unlinkat", "rename", "renameat", "renameat2", "rmdir"]
          auid_min: "%{probe.login_defs.UID_MIN}"
          required_arches: "%{probe.audit_arches.arches}"
    assertion:
      all_of:
        - actual: "%{probe.file_delete_audit_rule}"
          key: "count"
          compare: equals
          expected: 0
          message: "No audit rule was found to collect user file deletion events."
    reinforce:
      - action: audit.ensure_syscall_rule
        params:
          syscalls: ["unlink", "unlinkat", "rename", "renameat", "renameat2", "rmdir"]
          auid_min: "%{probe.login_defs.UID_MIN}"
          required_arches: "%{probe.audit_arches.arches}"

  - id: "3.3.2"
    desc: "Ensure changes to sudoers configuration are collected by audit"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: sudoers_audit_paths
        func: sudo.collect_audit_paths
        params:
          paths:
            - "/etc/sudoers"
      - name: sudoers_watch_rules
        func: meta.map
        params:
          source_probe: "sudoers_audit_paths"
          apply_func: "audit.find_watch_rule"
          params_template:
            path: "%{item.path}"
            permissions: "wa"
            require_key: false
    assertion:
      all_of:
        - actual: "%{probe.sudoers_watch_rules}"
          compare: for_all
          message: "Missing audit watch rules for active sudoers configuration paths."
          expected:
            all_of:
              - key: "found"
                compare: is_true
    reinforce:
      - action: sudo.ensure_audit_watches
        params: { root_path: "/etc/sudoers", permissions: "wa" }

  - id: "3.3.3"
    desc: "Ensure changes to user and group information are collected by audit"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: passwd_watch_rule
        func: audit.find_watch_rule
        params:
          path: "/etc/passwd"
          permissions: "wa"
          require_key: false
      - name: group_watch_rule
        func: audit.find_watch_rule
        params:
          path: "/etc/group"
          permissions: "wa"
          require_key: false
      - name: shadow_watch_rule
        func: audit.find_watch_rule
        params:
          path: "/etc/shadow"
          permissions: "wa"
          require_key: false
      - name: gshadow_watch_rule
        func: audit.find_watch_rule
        params:
          path: "/etc/gshadow"
          permissions: "wa"
          require_key: false
    assertion:
      all_of:
        - actual: "%{probe.passwd_watch_rule}"
          key: "found"
          compare: is_true
          message: "No audit watch rule was found for /etc/passwd."
        - actual: "%{probe.group_watch_rule}"
          key: "found"
          compare: is_true
          message: "No audit watch rule was found for /etc/group."
        - actual: "%{probe.shadow_watch_rule}"
          key: "found"
          compare: is_true
          message: "No audit watch rule was found for /etc/shadow."
        - actual: "%{probe.gshadow_watch_rule}"
          key: "found"
          compare: is_true
          message: "No audit watch rule was found for /etc/gshadow."
    reinforce:
      - action: audit.ensure_watch_rule
        params: { path: "/etc/passwd", permissions: "wa" }
      - action: audit.ensure_watch_rule
        params: { path: "/etc/group", permissions: "wa" }
      - action: audit.ensure_watch_rule
        params: { path: "/etc/shadow", permissions: "wa" }
      - action: audit.ensure_watch_rule
        params: { path: "/etc/gshadow", permissions: "wa" }

