  - id: "3.1.1"
    desc: "Ensure auditd is installed, enabled, and running"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: audit_pkg
        func: packages.get_installed
        params:
          name: "audit"
      - name: auditd_service
        func: services.get_unit_properties
        params:
          name: "auditd"
    assertion:
      all_of:
        - actual: "%{probe.audit_pkg}"
          key: "count"
          compare: is_greater_than
          expected: 0
          message: "The audit package is not installed."
        - actual: "%{probe.auditd_service}"
          key: "UnitFileState"
          compare: equals
          expected: "enabled"
          message: "The auditd service is not enabled."
        - actual: "%{probe.auditd_service}"
          key: "ActiveState"
          compare: equals
          expected: "active"
          message: "The auditd service is not active."
    reinforce:
      - action: packages.install
        params: { name: "audit" }
      - action: services.set_filestate
        params: { name: "auditd", state: "enable" }
      - action: services.set_active_state
        params: { name: "auditd", state: "start" }

  - id: "3.1.2"
    desc: "Ensure rsyslog or syslog-ng is installed, enabled, and running"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: rsyslog_pkg
        func: packages.get_installed
        params:
          name: "rsyslog"
      - name: rsyslog_service
        func: services.get_unit_properties
        params:
          name: "rsyslog"
      - name: syslog_ng_pkg
        func: packages.get_installed
        params:
          name: "syslog-ng"
      - name: syslog_ng_service
        func: services.get_unit_properties
        params:
          name: "syslog-ng"
    assertion:
      any_of:
        - all_of:
            - actual: "%{probe.rsyslog_pkg}"
              key: "count"
              compare: is_greater_than
              expected: 0
              message: "The rsyslog package is not installed."
            - actual: "%{probe.rsyslog_service}"
              key: "UnitFileState"
              compare: equals
              expected: "enabled"
              message: "The rsyslog service is not enabled."
            - actual: "%{probe.rsyslog_service}"
              key: "ActiveState"
              compare: equals
              expected: "active"
              message: "The rsyslog service is not active."
        - all_of:
            - actual: "%{probe.syslog_ng_pkg}"
              key: "count"
              compare: is_greater_than
              expected: 0
              message: "The syslog-ng package is not installed."
            - actual: "%{probe.syslog_ng_service}"
              key: "UnitFileState"
              compare: equals
              expected: "enabled"
              message: "The syslog-ng service is not enabled."
            - actual: "%{probe.syslog_ng_service}"
              key: "ActiveState"
              compare: equals
              expected: "active"
              message: "The syslog-ng service is not active."
    reinforce:
