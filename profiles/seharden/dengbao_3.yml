  - id: "2.4.2"
    desc: "Ensure the shutdown and halt accounts are locked"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: shutdown_account_present
        func: file.find_pattern
        params:
          paths: ["/etc/shadow"]
          pattern: "^shutdown:"
      - name: shutdown_account_lock_status
        func: file.find_pattern
        params:
          paths: ["/etc/shadow"]
          pattern: "^shutdown:(!|\\*|\\*LK\\*)"
      - name: halt_account_present
        func: file.find_pattern
        params:
          paths: ["/etc/shadow"]
          pattern: "^halt:"
      - name: halt_account_lock_status
        func: file.find_pattern
        params:
          paths: ["/etc/shadow"]
          pattern: "^halt:(!|\\*|\\*LK\\*)"
    assertion:
      all_of:
        - any_of:
            - actual: "%{probe.shutdown_account_lock_status}"
              key: "found"
              compare: is_true
              message: "The 'shutdown' account is neither removed nor locked in /etc/shadow."
            - actual: "%{probe.shutdown_account_present}"
              key: "found"
              compare: is_falsy
              message: "The 'shutdown' account is neither removed nor locked in /etc/shadow."
        - any_of:
            - actual: "%{probe.halt_account_lock_status}"
              key: "found"
              compare: is_true
              message: "The 'halt' account is neither removed nor locked in /etc/shadow."
            - actual: "%{probe.halt_account_present}"
              key: "found"
              compare: is_falsy
              message: "The 'halt' account is neither removed nor locked in /etc/shadow."
    reinforce:
      - action: users.lock_shutdown_and_halt_accounts
        params: {}

