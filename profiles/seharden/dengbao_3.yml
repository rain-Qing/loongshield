---
policy: "DengBao Level 3 Automated Profile for Alibaba Cloud Linux 3"
title: "DengBao Level 3 Automated Profile for Alibaba Cloud Linux 3"
id: dengbao_alinux3_l3
version: "0.2.0"
source: GB/T 22239-2019
description: >
  Automated, host-local checks mapped from DengBao level 3 requirements for
  Alibaba Cloud Linux 3. Site-specific role design, deployment-specific SSH
  source-address restrictions, external evidence for vulnerability and malware
  controls, and other non-host-local requirements remain outside automated
  coverage and are listed under manual_review_required.
levels:
  - id: l1_server
  - id: l2_server
    inherits_from:
      - l1_server
  - id: l1_workstation
  - id: l2_workstation
    inherits_from:
      - l1_workstation
default_level: l1_server
reference_type: dengbao_level_3
product: alinux3
manual_review_required:
  - area: access_control
    item: "Assign ordinary user, auditor, and security officer accounts according to organizational role design."
    reason: "Role separation and account naming are deployment-specific and cannot be inferred safely from host-local state."
  - area: access_control
    item: "Rename or remove environment-specific default accounts and verify default credentials are changed."
    reason: "Default account exposure depends on the deployed software inventory and approved exceptions."
  - area: access_control
    item: "Validate weak-password baseline results."
    reason: "Weak-password detection requires password dictionaries or external scanning evidence beyond host-local state."
  - area: access_control
    item: "Review shared, excess, and expired account cleanup evidence."
    reason: "Account ownership, business justification, and recertification status require organizational evidence beyond host-local files."
  - area: access_control
    item: "Review database and application object permissions, authorized-subject policy approval, and administrator least-privilege separation."
    reason: "Object-level authorization and approval workflows are application- and organization-specific."
  - area: access_control
    item: "Review sudoers authorization scope and any ALL privileges granted to non-root users."
    reason: "Administrator command scope and approval for broad sudo privileges require deployment-specific authorization context."
  - area: access_control
    item: "Review deployment-created service or database accounts that fall outside the default system UID range."
    reason: "Business-created service account classification and non-login expectations cannot be inferred safely from host-local defaults alone."
  - area: access_control
    item: "Review unowned or ungrouped files and directories on the root filesystem and any additional local filesystems."
    reason: "A full host filesystem traversal is expensive on large systems, and pseudo-filesystems, bind mounts, and local storage topology require site-specific interpretation."
  - area: audit
    item: "Verify periodic audit backup or third-party log collector evidence when external retention is required."
    reason: "External collectors and backup schedules cannot be proven from host-local files alone."
  - area: audit
    item: "Review audit partition sizing and the site-specific space_left and admin_space_left thresholds."
    reason: "Audit event volume, partition capacity, and warning thresholds depend on local retention goals and deployment-specific log rates."
  - area: intrusion_prevention
    item: "Review approved service exposure and file-sharing exceptions."
    reason: "Approved listening services, sharing exceptions, and compensating controls depend on deployment topology."
  - area: intrusion_prevention
    item: "Review deployment-specific SSH AllowUsers user@host allowlists."
    reason: "Trusted management endpoints and source-address restrictions depend on deployment topology."
  - area: intrusion_prevention
    item: "Review vulnerability management evidence."
    reason: "Cloud security center or equivalent patch and exposure evidence requires data beyond the host-local scan."
  - area: intrusion_prevention
    item: "Review intrusion detection and alerting evidence."
    reason: "Intrusion detection coverage and alert delivery paths require external operational evidence."
  - area: intrusion_prevention
    item: "Review malware protection evidence."
    reason: "Malware protection products, signatures, and managed defenses require external evidence beyond the host."

rules:
  # -----------------------------------------------------------------------
  # Category: identity authentication
  # -----------------------------------------------------------------------

  - id: "1.1.1"
    desc: "Ensure password fields are not empty"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: empty_password_check
        func: file.find_pattern
        params:
          paths: ["/etc/shadow"]
          pattern: "^[^:]*::"
    assertion:
      all_of:
        - actual: "%{probe.empty_password_check}"
          key: "found"
          compare: is_falsy
          message: "Found accounts in /etc/shadow with empty passwords."
    reinforce:
      - action: users.lock_empty_password_accounts
        params:
          shadow_path: "/etc/shadow"

  - id: "1.1.2"
    desc: "Ensure no duplicate UIDs exist"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: duplicate_uid_check
        func: file.find_duplicate_values_in_field
        params:
          path: "/etc/passwd"
          field_index: 3
          key_name: "uid"
          value_index: 1
    assertion:
      all_of:
        - actual: "%{probe.duplicate_uid_check}"
          key: "count"
          compare: equals
          expected: 0
          message: "Found duplicate UIDs in /etc/passwd."

  - id: "1.1.3"
    desc: "Ensure password minimum length is configured to 8 or more"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: pwquality_check
        func: pam.inspect_pwquality
        params:
          pam_paths:
            - "/etc/pam.d/system-auth"
            - "/etc/pam.d/password-auth"
          config_paths:
            - "/etc/security/pwquality.conf"
            - "/etc/security/pwquality.conf.d/*.conf"
          min_minlen: 8
          min_minclass: 3
          default_minlen: 8
    assertion:
      all_of:
        - actual: "%{probe.pwquality_check}"
          key: "weak_minlen_count"
          compare: equals
          expected: 0
          message: "The effective minimum password length is less than 8 in one or more PAM password stacks."
    reinforce:
      - action: file.set_key_value
        params: { path: "/etc/security/pwquality.conf", key: "minlen", value: "8", separator: "=" }
      - action: pam.ensure_entry
        params:
          path: "/etc/pam.d/system-auth"
          kind: "password"
          module: "pam_pwquality.so"
          control: "requisite"
          args: ["try_first_pass", "local_users_only"]
          anchor_kind: "password"
          anchor_module: "pam_unix.so"
      - action: pam.ensure_entry
        params:
          path: "/etc/pam.d/password-auth"
          kind: "password"
          module: "pam_pwquality.so"
          control: "requisite"
          args: ["try_first_pass", "local_users_only"]
          anchor_kind: "password"
          anchor_module: "pam_unix.so"

  - id: "1.1.4"
    desc: "Ensure password expiration is 90 days or less"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: login_defs
        func: file.parse_key_values
        params:
          path: "/etc/login.defs"
      - name: shadow_entries
        func: users.get_login_shadow_entries
        params: {}
    assertion:
      all_of:
        - actual: "%{probe.login_defs}"
          key: "PASS_MAX_DAYS"
          compare: is_less_than_or_equal_to
          expected: 90
          message: "Default PASS_MAX_DAYS in /etc/login.defs is greater than 90."
        - actual: "%{probe.shadow_entries}"
          compare: for_all
          message: "Found users with password expiration greater than 90 days."
          expected:
            all_of:
              - key: "pass_max_days"
                compare: is_less_than_or_equal_to
                expected: 90
    reinforce:
      - action: file.set_key_value
        params: { path: "/etc/login.defs", key: "PASS_MAX_DAYS", value: "90", separator: " " }
      - action: users.set_password_max_days_for_root
        params:
          max_days: 90
          entries: "%{probe.shadow_entries}"

  - id: "1.1.5"
    desc: "Ensure minimum days between password changes is 7 or more"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: login_defs
        func: file.parse_key_values
        params:
          path: "/etc/login.defs"
      - name: shadow_entries
        func: users.get_login_shadow_entries
        params: {}
    assertion:
      all_of:
        - actual: "%{probe.login_defs}"
          key: "PASS_MIN_DAYS"
          compare: is_greater_than_or_equal_to
          expected: 7
          message: "Default PASS_MIN_DAYS in /etc/login.defs is less than 7."
        - actual: "%{probe.shadow_entries}"
          compare: for_all
          message: "Found users with minimum days between password changes less than 7."
          expected:
            all_of:
              - key: "pass_min_days"
                compare: is_greater_than_or_equal_to
                expected: 7
    reinforce:
      - action: file.set_key_value
        params: { path: "/etc/login.defs", key: "PASS_MIN_DAYS", value: "7", separator: " " }
      - action: users.set_password_min_days_for_root
        params:
          min_days: 7
          entries: "%{probe.shadow_entries}"

  - id: "1.1.6"
    desc: "Ensure password complexity policy is enabled"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: pwquality_check
        func: pam.inspect_pwquality
        params:
          pam_paths:
            - "/etc/pam.d/system-auth"
            - "/etc/pam.d/password-auth"
          config_paths:
            - "/etc/security/pwquality.conf"
            - "/etc/security/pwquality.conf.d/*.conf"
          min_minlen: 8
          min_minclass: 3
          default_minlen: 8
    assertion:
      all_of:
        - actual: "%{probe.pwquality_check}"
          key: "missing_module_count"
          compare: equals
          expected: 0
          message: "The pam_pwquality module is not enabled in all PAM password stacks."
        - actual: "%{probe.pwquality_check}"
          key: "weak_complexity_count"
          compare: equals
          expected: 0
          message: "The effective password complexity policy does not require enough character classes in one or more PAM password stacks."
    reinforce:
      - action: file.set_key_value
        params: { path: "/etc/security/pwquality.conf", key: "minclass", value: "3", separator: "=" }
      - action: pam.ensure_entry
        params:
          path: "/etc/pam.d/system-auth"
          kind: "password"
          module: "pam_pwquality.so"
          control: "requisite"
          args: ["try_first_pass", "local_users_only"]
          anchor_kind: "password"
          anchor_module: "pam_unix.so"
      - action: pam.ensure_entry
        params:
          path: "/etc/pam.d/password-auth"
          kind: "password"
          module: "pam_pwquality.so"
          control: "requisite"
          args: ["try_first_pass", "local_users_only"]
          anchor_kind: "password"
          anchor_module: "pam_unix.so"

  - id: "1.1.7"
    desc: "Ensure root is the only UID 0 account"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: root_uid_zero_check
        func: file.find_pattern
        params:
          paths: ["/etc/passwd"]
          pattern: "^root:[^:]*:0:0:"
      - name: duplicate_uid_check
        func: file.find_duplicate_values_in_field
        params:
          path: "/etc/passwd"
          field_index: 3
          match_key: 0
          key_name: "uid"
          value_index: 1
    assertion:
      all_of:
        - actual: "%{probe.root_uid_zero_check}"
          key: "found"
          compare: is_true
          message: "The root account is not configured with UID 0."
        - actual: "%{probe.duplicate_uid_check}"
          key: "count"
          compare: equals
          expected: 0
          message: "Found duplicate UIDs in /etc/passwd; root is not the only UID 0 account."

  - id: "1.1.8"
    desc: "Ensure password reuse is restricted for at least the last 24 passwords"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: password_history_check
        func: pam.check_password_history
        params:
          pam_paths:
            - "/etc/pam.d/system-auth"
            - "/etc/pam.d/password-auth"
          min_remember: 24
          config_paths:
            - "/etc/security/pwhistory.conf"
            - "/etc/security/pwhistory.conf.d/*.conf"
    assertion:
      all_of:
        - actual: "%{probe.password_history_check}"
          key: "count"
          compare: equals
          expected: 0
          message: "Password reuse restriction is not configured for at least the last 24 passwords in all PAM password stacks."
    reinforce:
      - action: file.set_key_value
        params: { path: "/etc/security/pwhistory.conf", key: "remember", value: "24", separator: "=" }
      - action: pam.ensure_entry
        params:
          path: "/etc/pam.d/system-auth"
          kind: "password"
          module: "pam_pwhistory.so"
          control: "required"
          args: ["use_authtok"]
          anchor_kind: "password"
          anchor_module: "pam_unix.so"
      - action: pam.ensure_entry
        params:
          path: "/etc/pam.d/password-auth"
          kind: "password"
          module: "pam_pwhistory.so"
          control: "required"
          args: ["use_authtok"]
          anchor_kind: "password"
          anchor_module: "pam_unix.so"

  - id: "1.2.1"
    desc: "Ensure SSH protocol 1 is not enabled"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: ssh_protocol1_ondisk
        func: file.find_pattern
        params:
          paths:
            - "/etc/ssh/sshd_config"
            - "/etc/ssh/sshd_config.d/*.conf"
          pattern: "(?i)^%s*protocol%s+1([,%s]|$)|^%s*protocol%s+[^#]*,%s*1([,%s]|$)"
    assertion:
      all_of:
        - actual: "%{probe.ssh_protocol1_ondisk}"
          key: "found"
          compare: is_falsy
          message: "SSH configuration explicitly enables protocol 1."
    reinforce:
      - action: file.remove_line_matching
        params:
          paths:
            - "/etc/ssh/sshd_config"
            - "/etc/ssh/sshd_config.d/*.conf"
          pattern: "^%s*[Pp][Rr][Oo][Tt][Oo][Cc][Oo][Ll]%s+[^#]*1"

  - id: "1.2.2"
    desc: "Ensure telnet packages are not installed"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: telnet_installed
        func: packages.get_installed
        params:
          name: "telnet*"
    assertion:
      all_of:
        - actual: "%{probe.telnet_installed}"
          key: "count"
          compare: equals
          expected: 0
          message: "Telnet packages are installed."
    reinforce:
      - action: packages.remove_matching
        params: { pattern: "telnet*" }

  - id: "1.3.1"
    desc: "Ensure login failure lockout policy is configured"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: faillock_check
        func: pam.inspect_faillock
        params:
          pam_paths:
            - "/etc/pam.d/system-auth"
            - "/etc/pam.d/password-auth"
          config_path: "/etc/security/faillock.conf"
          default_deny: 3
          default_unlock_time: 600
    assertion:
      all_of:
        - actual: "%{probe.faillock_check}"
          key: "count"
          compare: equals
          expected: 0
          message: "The PAM login-failure lockout policy is incomplete or misconfigured."
    reinforce:
      - action: file.set_key_value
        params: { path: "/etc/security/faillock.conf", key: "deny", value: "3", separator: "=" }
      - action: file.set_key_value
        params: { path: "/etc/security/faillock.conf", key: "unlock_time", value: "600", separator: "=" }
      - action: pam.ensure_entry
        params:
          path: "/etc/pam.d/system-auth"
          kind: "auth"
          module: "pam_faillock.so"
          control: "required"
          args: ["preauth"]
          match_args: ["preauth"]
          anchor_kind: "auth"
          anchor_module: "pam_unix.so"
      - action: pam.ensure_entry
        params:
          path: "/etc/pam.d/system-auth"
          kind: "auth"
          module: "pam_faillock.so"
          control: "sufficient"
          args: ["authsucc"]
          match_args: ["authsucc"]
          anchor_kind: "auth"
          anchor_module: "pam_unix.so"
      - action: pam.ensure_entry
        params:
          path: "/etc/pam.d/system-auth"
          kind: "auth"
          module: "pam_faillock.so"
          control: "[default=die]"
          args: ["authfail"]
          match_args: ["authfail"]
          anchor_kind: "auth"
          anchor_module: "pam_unix.so"
      - action: pam.ensure_entry
        params:
          path: "/etc/pam.d/password-auth"
          kind: "auth"
          module: "pam_faillock.so"
          control: "required"
          args: ["preauth"]
          match_args: ["preauth"]
          anchor_kind: "auth"
          anchor_module: "pam_unix.so"
      - action: pam.ensure_entry
        params:
          path: "/etc/pam.d/password-auth"
          kind: "auth"
          module: "pam_faillock.so"
          control: "sufficient"
          args: ["authsucc"]
          match_args: ["authsucc"]
          anchor_kind: "auth"
          anchor_module: "pam_unix.so"
      - action: pam.ensure_entry
        params:
          path: "/etc/pam.d/password-auth"
          kind: "auth"
          module: "pam_faillock.so"
          control: "[default=die]"
          args: ["authfail"]
          match_args: ["authfail"]
          anchor_kind: "auth"
          anchor_module: "pam_unix.so"

  - id: "1.3.2"
    desc: "Ensure SSH root login is disabled"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: permit_root_login_effective
        func: ssh.get_effective_value
        params:
          key: "permitrootlogin"
          conditions:
            user: "root"
            from: "localhost"
      - name: permit_root_login_ondisk_noncompliant
        func: file.find_pattern
        params:
          paths:
            - "/etc/ssh/sshd_config"
            - "/etc/ssh/sshd_config.d/*.conf"
          pattern: "(?i)^%s*PermitRootLogin%s+(yes|prohibit-password|without-password|forced-commands-only)(%s|#|$)"
    assertion:
      all_of:
        - actual: "%{probe.permit_root_login_effective}"
          key: "value"
          compare: equals
          expected: "no"
          message: "The effective SSH configuration for PermitRootLogin is not 'no'."
        - actual: "%{probe.permit_root_login_ondisk_noncompliant}"
          key: "found"
          compare: is_falsy
          message: "PermitRootLogin is explicitly set to a non-'no' value in an SSH configuration file."

  - id: "1.3.3"
    desc: "Ensure SSH MaxAuthTries is set to 4 or less"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: max_auth_tries_effective
        func: ssh.get_effective_value
        params:
          key: "maxauthtries"
          conditions:
            user: "root"
            from: "localhost"
      - name: max_auth_tries_ondisk_noncompliant
        func: file.find_pattern
        params:
          paths:
            - "/etc/ssh/sshd_config"
            - "/etc/ssh/sshd_config.d/*.conf"
          pattern: "(?i)^%s*maxauthtries%s+([5-9]|[1-9][0-9]+)"
    assertion:
      all_of:
        - actual: "%{probe.max_auth_tries_effective}"
          key: "value"
          compare: is_less_than_or_equal_to
          expected: 4
          message: "The effective MaxAuthTries is greater than 4."
        - actual: "%{probe.max_auth_tries_ondisk_noncompliant}"
          key: "found"
          compare: is_falsy
          message: "MaxAuthTries is set to a value greater than 4 in SSH configuration."
    reinforce:
      - action: file.set_key_value
        params: { path: "/etc/ssh/sshd_config", key: "MaxAuthTries", value: "4", separator: " " }

  - id: "1.3.4"
    desc: "Ensure SSH LoginGraceTime is set to 60 seconds or less"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: login_grace_time_effective
        func: ssh.get_effective_value
        params:
          key: "logingracetime"
          value_type: "duration_seconds"
          conditions:
            user: "root"
            from: "localhost"
    assertion:
      all_of:
        - actual: "%{probe.login_grace_time_effective}"
          key: "value"
          compare: is_less_than_or_equal_to
          expected: 60
          message: "The effective LoginGraceTime is greater than 60 seconds."
    reinforce:
      - action: file.set_key_value
        params: { path: "/etc/ssh/sshd_config", key: "LoginGraceTime", value: "60", separator: " " }

  - id: "1.3.5"
    desc: "Ensure SSH idle session disconnect is configured"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: client_alive_interval_effective
        func: ssh.get_effective_value
        params:
          key: "clientaliveinterval"
          conditions:
            user: "root"
            from: "localhost"
      - name: client_alive_count_max_effective
        func: ssh.get_effective_value
        params:
          key: "clientalivecountmax"
          conditions:
            user: "root"
            from: "localhost"
    assertion:
      all_of:
        - actual: "%{probe.client_alive_interval_effective}"
          key: "value"
          compare: is_greater_than
          expected: 0
          message: "The effective ClientAliveInterval is not configured."
        - actual: "%{probe.client_alive_interval_effective}"
          key: "value"
          compare: is_less_than_or_equal_to
          expected: 300
          message: "The effective ClientAliveInterval is greater than 300 seconds."
        - actual: "%{probe.client_alive_count_max_effective}"
          key: "value"
          compare: is_less_than_or_equal_to
          expected: 2
          message: "The effective ClientAliveCountMax is greater than 2."
    reinforce:
      - action: file.set_key_value
        params: { path: "/etc/ssh/sshd_config", key: "ClientAliveInterval", value: "300", separator: " " }
      - action: file.set_key_value
        params: { path: "/etc/ssh/sshd_config", key: "ClientAliveCountMax", value: "2", separator: " " }

  - id: "1.3.6"
    desc: "Ensure session timeout is configured to 30 minutes or less"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: session_timeout_check
        func: shell.find_tmout_assignments
        params:
          paths:
            - "/etc/profile"
            - "/etc/bashrc"
            - "/etc/profile.d/*.sh"
          max_value: 1800
    assertion:
      all_of:
        - actual: "%{probe.session_timeout_check}"
          key: "count"
          compare: is_greater_than
          expected: 0
          message: "No compliant TMOUT setting of 1800 seconds or less was found in system-wide profiles."
        - actual: "%{probe.session_timeout_check}"
          key: "conflicting_count"
          compare: equals
          expected: 0
          message: "Found explicit TMOUT settings that disable or weaken the session timeout policy."
    reinforce:
      # Remove conflicting TMOUT assignments without export (TMOUT=xxx)
      - action: file.remove_line_matching
        params:
          paths:
            - "/etc/profile"
            - "/etc/bashrc"
            - "/etc/profile.d/*.sh"
          pattern: "^%s*TMOUT%s*="
      # Remove conflicting TMOUT assignments with export (export TMOUT=xxx)
      - action: file.remove_line_matching
        params:
          paths:
            - "/etc/profile"
            - "/etc/bashrc"
            - "/etc/profile.d/*.sh"
          pattern: "^%s*export%s+.-TMOUT%s*="
      # Remove conflicting TMOUT unsets
      - action: file.remove_line_matching
        params:
          paths:
            - "/etc/profile"
            - "/etc/bashrc"
            - "/etc/profile.d/*.sh"
          pattern: "^%s*unset%s+TMOUT%s*$"
      # Add compliant TMOUT setting
      - action: file.set_key_value
        params: { path: "/etc/profile.d/loongshield-session-timeout.sh", key: "TMOUT", value: "1800", separator: "=" }
      - action: file.set_key_value
        params: { path: "/etc/bashrc", key: "TMOUT", value: "1800", separator: "=" }

  # -----------------------------------------------------------------------
  # Category: access control
  # -----------------------------------------------------------------------

  - id: "2.1.1"
    desc: "Ensure user home directory permissions are 750 or more restrictive"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: local_user_home_directories
        func: users.get_existing_home_directories
        params: {}
