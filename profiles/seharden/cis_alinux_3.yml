    desc: "Ensure audit_backlog_limit is configured"
    level: ["l2_server"]
    status: automated
    probes:
      - name: audit_backlog_limit
        func: boot.inspect_kernel_parameter
        params:
          name: "audit_backlog_limit"
          numeric_min: 8192
          boot_paths:
            - "/boot/grub2/grub.cfg"
            - "/boot/grub2/grubenv"
            - "/boot/efi/EFI/*/grub.cfg"
          default_paths:
            - "/etc/default/grub"
    assertion:
      all_of:
        - actual: "%{probe.audit_backlog_limit}"
          key: "available"
          compare: is_true
          message: "Bootloader evidence for audit_backlog_limit is not available."
        - actual: "%{probe.audit_backlog_limit}"
          key: "boot_configured"
          compare: is_true
          message: "audit_backlog_limit is not configured to 8192 or larger in bootloader kernel entries."
        - actual: "%{probe.audit_backlog_limit}"
          key: "default_configured"
          compare: is_true
          message: "audit_backlog_limit is not configured to 8192 or larger in /etc/default/grub."

