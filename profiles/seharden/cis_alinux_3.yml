  - id: "4.1.1"
    desc: "Ensure firewalld is installed"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: firewalld_pkg
        func: packages.get_installed
        params:
          name: "firewalld"
    assertion:
      all_of:
        - actual: "%{probe.firewalld_pkg}"
          key: "count"
          compare: is_greater_than
          expected: 0
          message: "The firewalld package is not installed."

  - id: "4.1.2"
    desc: "Ensure firewalld backend is configured"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: firewalld_conf
        func: file.parse_key_values
        params:
          path: "/etc/firewalld/firewalld.conf"
          normalize_values: "lower"
          allow_missing: true
    assertion:
      all_of:
        - actual: "%{probe.firewalld_conf}"
          key: "FirewallBackend"
          compare: equals
          expected: "nftables"
          message: "FirewallBackend is not set to nftables in /etc/firewalld/firewalld.conf."

  - id: "4.1.3"
    desc: "Ensure firewalld.service is configured"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: firewalld_service
        func: services.get_unit_properties
        params:
          name: "firewalld.service"
    assertion:
      all_of:
        - actual: "%{probe.firewalld_service}"
          key: "UnitFileState"
          compare: equals
          expected: "enabled"
          message: "firewalld.service is not enabled."
        - actual: "%{probe.firewalld_service}"
          key: "ActiveState"
          compare: equals
          expected: "active"
          message: "firewalld.service is not active."

  - id: "4.1.4"
    desc: "Ensure firewalld active zone target is configured"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: firewalld_active_zone_targets
        func: firewalld.inspect_active_zone_targets
    assertion:
      all_of:
        - actual: "%{probe.firewalld_active_zone_targets}"
          key: "available"
          compare: is_true
          message: "firewall-cmd output is not available for active zone target inspection."
        - actual: "%{probe.firewalld_active_zone_targets}"
          key: "checked_count"
          compare: is_greater_than
          expected: 0
