          name: "auditd"
    assertion:
      all_of:
        - actual: "%{probe.auditd_service}"
          key: "UnitFileState"
          compare: equals
          expected: "enabled"
          message: "The 'auditd' service is not enabled."
        - actual: "%{probe.auditd_service}"
          key: "ActiveState"
          compare: equals
          expected: "active"
          message: "The 'auditd' service is not active."

