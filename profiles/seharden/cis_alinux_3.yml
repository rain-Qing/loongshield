          key: "count"
          compare: is_greater_than
          expected: 0
          message: "The libselinux package is not installed."

  - id: "1.3.1.2"
    desc: "Ensure SELinux policy is configured"
    level: ["l2_server", "l2_workstation"]
    status: automated
    probes:
      - name: selinux_policy
        func: file.parse_key_values
        params:
          path: "/etc/selinux/config"
          normalize_values: "lower"
          allow_missing: true
    assertion:
      any_of:
        - actual: "%{probe.selinux_policy}"
          key: "SELINUXTYPE"
          compare: equals
          expected: "targeted"
          message: "SELINUXTYPE is not set to targeted or mls in /etc/selinux/config."
        - actual: "%{probe.selinux_policy}"
          key: "SELINUXTYPE"
          compare: equals
          expected: "mls"
          message: "SELINUXTYPE is not set to targeted or mls in /etc/selinux/config."

  - id: "1.3.1.3"
    desc: "Ensure the SELinux mode is not disabled"
    level: ["l2_server", "l2_workstation"]
    status: automated
    probes:
      - name: selinux_boot_check
        func: file.find_pattern
        params:
          paths:
            - "/boot/grub2/grub.cfg"
          pattern: "^%s*linux.*(selinux=0|enforcing=0)"
      - name: selinux_runtime_state
        func: file.find_pattern
        params:
          paths:
            - "/sys/fs/selinux/enforce"
          pattern: "^[01]$"
      - name: selinux_conf_state
        func: file.find_pattern
        params:
          paths:
            - "/etc/selinux/config"
          pattern: "^SELINUX=(enforcing|permissive)"
    assertion:
      all_of:
        - actual: "%{probe.selinux_boot_check}"
          key: "found"
          compare: is_falsy
          message: "SELinux is disabled in the bootloader configuration."
        - actual: "%{probe.selinux_runtime_state}"
          key: "found"
          compare: is_true
          message: "SELinux runtime state is not available."
        - actual: "%{probe.selinux_conf_state}"
          key: "found"
          compare: is_true
          message: "SELINUX is not set to enforcing or permissive in /etc/selinux/config."

