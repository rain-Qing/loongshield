  - id: "6.1.2"
    desc: "Ensure filesystem integrity is regularly checked"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: aide_cron_check
        func: file.find_pattern
        params:
          paths:
            - "/etc/cron.d/*"
            - "/etc/cron.hourly/*"
            - "/etc/cron.daily/*"
            - "/etc/cron.weekly/*"
            - "/etc/cron.monthly/*"
            - "/etc/crontab"
            - "/var/spool/cron/*"
          pattern: "^[^#].*/usr/s?bin/aide.*--check"
      - name: aide_service_status
        func: services.get_unit_properties
        params:
          name: "aidecheck.service"
      - name: aide_timer_status
        func: services.get_unit_properties
        params:
          name: "aidecheck.timer"
    assertion:
      any_of:
        - actual: "%{probe.aide_cron_check}"
          key: "found"
          compare: is_true
          message: "AIDE integrity check is not scheduled via cron or systemd timer."
        - all_of:
            - actual: "%{probe.aide_service_status}"
              key: "UnitFileState"
              compare: equals
              expected: "enabled"
              message: "AIDE is configured via systemd timer, but aidecheck.service is not enabled."
            - actual: "%{probe.aide_timer_status}"
              key: "UnitFileState"
              compare: equals
              expected: "enabled"
              message: "AIDE is configured via systemd, but aidecheck.timer is not enabled."

  - id: "6.1.3"
    desc: "Ensure cryptographic mechanisms are used to protect the integrity of audit tools"
    level: ["l1_server"]
    status: automated
    probes:
      - name: aide_audit_tools
        func: aide.inspect_required_file_rules
        params:
          config_paths:
            - "/etc/aide.conf"
            - "/etc/aide.conf.d/*"
          required_tools:
            - "auditctl"
            - "auditd"
            - "ausearch"
            - "aureport"
            - "autrace"
            - "augenrules"
          required_attrs:
            - "p"
            - "i"
            - "n"
            - "u"
            - "g"
            - "s"
            - "b"
            - "acl"
            - "xattrs"
            - "sha512"
    assertion:
      all_of:
        - actual: "%{probe.aide_audit_tools}"
          key: "available"
          compare: is_true
          message: "AIDE configuration evidence is not available for audit tool integrity checks."
        - actual: "%{probe.aide_audit_tools}"
          key: "all_configured"
          compare: is_true
          message: "One or more installed audit tools are not protected by AIDE rules including p+i+n+u+g+s+b+acl+xattrs+sha512."

