      all_of:
        - any_of:
            - actual: "%{probe.opasswd_attrs}"
              key: "exists"
              compare: is_falsy
              message: "/etc/security/opasswd exists and must be root-owned with mode 0600 or stricter."
            - all_of:
                - actual: "%{probe.opasswd_attrs}"
                  key: "mode"
                  compare: mode_is_no_more_permissive
                  expected: 0600
                  message: "Permissions on /etc/security/opasswd are more permissive than 0600."
                - actual: "%{probe.opasswd_attrs}"
                  key: "uid"
                  compare: equals
                  expected: 0
                  message: "The owner of /etc/security/opasswd is not root."
                - actual: "%{probe.opasswd_attrs}"
                  key: "gid"
                  compare: equals
                  expected: 0
                  message: "The group owner of /etc/security/opasswd is not root."
        - any_of:
            - actual: "%{probe.opasswd_old_attrs}"
              key: "exists"
              compare: is_falsy
              message: "/etc/security/opasswd.old exists and must be root-owned with mode 0600 or stricter."
            - all_of:
                - actual: "%{probe.opasswd_old_attrs}"
                  key: "mode"
