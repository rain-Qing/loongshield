  - id: "1.2.1.2"
    desc: "Ensure gpgcheck is configured"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: dnf_conf_check
        func: file.parse_key_values
        params:
          path: "/etc/dnf/dnf.conf"
          normalize_values: "lower"
      - name: repo_gpgcheck_override
        func: file.find_key_value_outside_allowed
        params:
          paths:
            - "/etc/yum.repos.d/*"
          key: "gpgcheck"
          allowed_values: ["1", "true", "yes"]
          normalize_values: "lower"
    assertion:
      all_of:
        - any_of:
            - actual: "%{probe.dnf_conf_check}"
              key: "gpgcheck"
              compare: equals
              expected: "1"
              message: "gpgcheck is not enabled in /etc/dnf/dnf.conf."
            - actual: "%{probe.dnf_conf_check}"
              key: "gpgcheck"
              compare: equals
              expected: "true"
              message: "gpgcheck is not enabled in /etc/dnf/dnf.conf."
            - actual: "%{probe.dnf_conf_check}"
              key: "gpgcheck"
              compare: equals
              expected: "yes"
              message: "gpgcheck is not enabled in /etc/dnf/dnf.conf."
        - actual: "%{probe.repo_gpgcheck_override}"
          key: "found"
          compare: is_falsy
          message: "Found a repository file in /etc/yum.repos.d/ that sets gpgcheck to a value other than 1, true, or yes."

