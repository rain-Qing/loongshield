          message: "Default INACTIVE setting is greater than 45 or disabled (-1)."
        - actual: "%{probe.user_defaults}"
          key: "INACTIVE"
          compare: is_greater_than_or_equal_to
          expected: 0
          message: "Default INACTIVE setting is negative."
        - actual: "%{probe.user_defaults}"
          key: "INACTIVE"
          compare: is_not_equal_to
          expected: -1
          message: "Default INACTIVE setting is disabled (-1)."
        - actual: "%{probe.shadow_entries}"
          compare: for_all
          message: "Found users with an inactive password lock period outside the 0..45 day range."
          expected:
            all_of:
              - key: "inactive"
                compare: is_less_than_or_equal_to
                expected: 45
              - key: "inactive"
                compare: is_greater_than_or_equal_to
