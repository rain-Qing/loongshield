  - id: "3.2.1"
    desc: "Ensure atm kernel module is not available"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: atm_disable_state
        func: kmod.get_disable_state
        params: { name: "atm" }
    assertion:
      actual: "%{probe.atm_disable_state}"
      key: "disabled"
      compare: is_true
      message: "The atm kernel module is available, built in, loaded, or missing required modprobe disable policy."
    reinforce:
      - action: kmod.unload
        params: { name: "atm" }
      - action: kmod.blacklist
        params: { name: "atm" }
      - action: kmod.set_install_command
        params: { name: "atm" }

