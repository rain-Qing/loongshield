      - name: login_defs
        func: file.parse_key_values
        params:
          path: "/etc/login.defs"
      - name: shadow_entries
        func: users.get_shadow_entries
        params: {}
    assertion:
      all_of:
        - all_of:
            - actual: "%{probe.login_defs}"
              key: "PASS_MAX_DAYS"
              compare: is_greater_than
              expected: 0
              message: "Default PASS_MAX_DAYS in /etc/login.defs is not greater than 0."
            - actual: "%{probe.login_defs}"
              key: "PASS_MAX_DAYS"
              compare: is_less_than_or_equal_to
              expected: 365
              message: "Default PASS_MAX_DAYS in /etc/login.defs is greater than 365."
        - actual: "%{probe.shadow_entries}"
          compare: for_all
          message: "Found users with password expiration outside the 1..365 day range."
          expected:
            all_of:
              - key: "pass_max_days"
                compare: is_greater_than
                expected: 0
              - key: "pass_max_days"
                compare: is_less_than_or_equal_to
                expected: 365

