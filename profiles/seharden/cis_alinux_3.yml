    level: ["l2_server"]
    status: automated
    probes:
      - name: sudoers_audit_rules
        func: audit.inspect_rule_coverage
        params:
          requirements:
            - {
                name: "sudoers",
                type: "watch",
                path: "/etc/sudoers",
                permissions: "wa",
                key: "scope",
              }
            - {
                name: "sudoers_d",
                type: "watch",
                path: "/etc/sudoers.d",
                permissions: "wa",
                key: "scope",
              }
