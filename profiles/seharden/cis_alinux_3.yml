      all_of:
        - actual: "%{probe.sudoers_audit_rules}"
          key: "available"
          compare: is_true
          message: "Persistent and loaded audit rule evidence for sudoers scope changes is not available."
        - actual: "%{probe.sudoers_audit_rules}"
          key: "all_configured"
          compare: is_true
          message: "Audit rules do not collect changes to /etc/sudoers and /etc/sudoers.d in both persistent and loaded configuration."

