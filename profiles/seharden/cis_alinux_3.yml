---
policy: "CIS Alibaba Cloud Linux 3 Benchmark v2.0.0"
title: "CIS Alibaba Cloud Linux 3 Benchmark v2.0.0"
id: cis_alinux_3
version: "0.0.3"
source: https://www.cisecurity.org/benchmark/aliyun_linux
benchmark_version: "2.0.0"
benchmark_workbench_source: https://workbench.cisecurity.org/benchmarks/23595/files
benchmark_pdf_source: https://workbench.cisecurity.org/cis/api/v1/file/6532/download
benchmark_build_kit_source: https://workbench.cisecurity.org/files/6746
benchmark_update_source: https://www.cisecurity.org/insights/blog/cis-benchmarks-monthly-update-october-2025
coverage: automated_subset
description: >
  Automated SEHarden checks tracking the CIS Alibaba Cloud Linux 3 Benchmark
  v2.0.0. Use the official CIS PDF or WorkBench content for full control review
  and any manual evidence that cannot be inferred from static host facts.
levels:
  - id: l1_server
  - id: l2_server
    inherits_from:
      - l1_server
  - id: l1_workstation
  - id: l2_workstation
    inherits_from:
      - l1_workstation
default_level: l1_server
reference_type: cis
product: alinux3

manual_review_required:
  - area: cis_1_2_1_1_gpg_keys
    item: "CIS 1.2.1.1 Ensure GPG keys are configured"
    reason: "CIS v2.0.0 classifies this as manual; repository key provenance and trust cannot be proven from host-local static checks alone."
    level: ["l1_server", "l1_workstation"]
  - area: cis_2_1_24_approved_services
    item: "CIS 2.1.24 Ensure only approved services are listening on a network interface"
    reason: "The approved listening-service inventory is deployment-specific and requires operator evidence outside automated host probes."
    level: ["l1_server", "l1_workstation"]
  - area: cis_5_4_1_2_minimum_password_days
    item: "CIS 5.4.1.2 Ensure minimum password days is configured"
    reason: "CIS v2.0.0 classifies this as manual; enforcing the site-approved password-aging policy requires account lifecycle review."
    level: ["l2_server"]
  - area: cis_6_2_2_6_rsyslog_remote
    item: "CIS 6.2.2.6 Ensure rsyslog is configured to send logs to a remote log host"
    reason: "CIS v2.0.0 classifies this as manual because remote log destinations and forwarding policy are site-specific."
    level: ["l1_server", "l1_workstation"]

rules:
  - id: "1.1.1.1"
    desc: "Ensure cramfs kernel module is not available"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: cramfs_disable_state
        func: kmod.get_disable_state
        params: { name: "cramfs" }
    assertion:
      actual: "%{probe.cramfs_disable_state}"
      key: "disabled"
      compare: is_true
      message: "The cramfs kernel module is available, built in, loaded, or missing required modprobe disable policy."
    reinforce:
      - action: kmod.unload
        params: { name: "cramfs" }
      - action: kmod.blacklist
        params: { name: "cramfs" }
      - action: kmod.set_install_command
        params: { name: "cramfs" }

